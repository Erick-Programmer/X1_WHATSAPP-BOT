  <!-- Subtexto -->
  <text x="540" y="1190" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" letter-spacing="0.3">
