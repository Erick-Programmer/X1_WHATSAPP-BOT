<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="footer-shadow" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2563EB" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1080" height="1350" fill="#F8FAFC"/>

  <!-- ===== HEADER ===== -->
  <!-- Título -->
  <text x="64" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#111827" letter-spacing="-0.5">
    Planner Estudante Pro
  </text>

  <!-- Subtítulo -->
  <text x="64" y="148" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" fill="#6B7280" letter-spacing="0.2">
