  <!-- ===== FOOTER ===== -->
  <!-- Faixa azul sutil -->
  <rect x="64" y="1100" width="952" height="120" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1" filter="url(#footer-shadow)"/>

  <!-- "+ 3 ebooks bônus inclusos" -->
  <text x="540" y="1148" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2563EB" letter-spacing="-0.3">
