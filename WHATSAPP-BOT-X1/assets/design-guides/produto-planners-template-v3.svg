  <!-- Texto principal: "+ 3 ebooks bônus inclusos" -->
  <text x="540" y="840" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2563EB" letter-spacing="-0.3">
    + 3 ebooks bônus inclusos
  </text>

  <!-- 3 placeholders de ebook lado a lado -->
  <!-- Cards: 210x297 (A4), gap 20px horizontal -->
  <!-- 3*210 + 2*20 = 670, offset x = (1080-670)/2 = 205 -->

  <!-- Ebook 1 - Organização Escolar -->
  <g transform="translate(205, 870)">
    <rect width="210" height="297" rx="12" fill="#FFFFFF" filter="url(#bonus-shadow)"/>
    <rect x="8" y="8" width="194" height="257" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="105" y="142" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94A3B8">placeholder</text>
    <text x="105" y="158" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94A3B8">capa aqui</text>
    <text x="105" y="286" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#374151">Organização Escolar</text>
