<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="bonus-shadow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#2563EB" flood-opacity="0.08"/>
    </filter>
    <filter id="selo-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#2563EB" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1080" height="1350" fill="#F8FAFC"/>

  <!-- ===== HEADER ===== -->
  <!-- Selo PDF DIGITAL -->
  <rect x="888" y="56" width="136" height="32" rx="16" fill="#2563EB" filter="url(#selo-shadow)"/>
  <text x="956" y="77" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">
    PDF DIGITAL
  </text>

  <!-- Título -->
  <text x="56" y="110" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="700" fill="#111827" letter-spacing="-0.5">
    Planner Estudante Pro
  </text>

  <!-- Subtítulo -->
  <text x="56" y="158" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" fill="#6B7280" letter-spacing="0.2">
